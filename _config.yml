title: Edwin's Journey
description: mount /dev/brain && tail -f /var/log/idea >> /var/www/
url: "https://edwin.github.io"
baseurl: ""

author:
  name: Muhammad Edwin
  email: edwinkun at gmail dot com

theme: minima

minima:
  skin: classic  # options: classic, dark, solarized, solarized-dark

# Social links (shown in footer)
minima:
  social_links:
    - { platform: github, user_url: "https://github.com/edwin" }

plugins:
  - jekyll-feed       # Generates /feed.xml RSS
  - jekyll-sitemap    # Generates /sitemap.xml
  - jekyll-seo-tag    # Adds SEO meta tags

# Pagination (optional)
paginate: 5
paginate_path: "/blog/page:num/"

# Permalink style for posts
permalink: /blog/:year/:month/:day/:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
